<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Астро Детектив</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: rgba(255,255,255,0.12);
    --text: #f0ede8;
    --muted: rgba(240,237,232,0.45);
    --accent: rgba(255,255,255,0.06);
    --hi: #ffffff;
    --hi-dim: rgba(255,255,255,0.08);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    overflow-y: auto;
  }

  /* ── HEADER ── */
  .header {
    width: 100%;
    max-width: 430px;
    padding: 14px 20px 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .btn-home {
    font-size: 18px; line-height: 1;
    background: none; border: none; cursor: pointer;
    color: var(--muted); padding: 2px 4px 2px 0;
    transition: color 0.15s;
  }
  .btn-home:hover { color: var(--text); }
  .case-label  { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; }
  .case-title  { font-size: 12px; color: var(--muted); text-align: center; flex: 1; padding: 0 8px; }
  .case-counter{ font-size: 12px; color: var(--muted); }

  .progress-bar { display: flex; gap: 6px; height: 4px; }
  .progress-bar .seg {
    flex: 1; border-radius: 2px;
    background: var(--accent);
    transition: background 0.3s;
  }
  .progress-bar .seg.filled { background: var(--hi); }

  /* ── DESCRIPTION CARD ── */
  .desc-card {
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    gap: 12px;
    align-items: stretch;
    width: calc(100% - 40px);
  }
  .desc-icon {
    width: 72px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--accent);
  }
  .desc-icon img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  .desc-text h2 {
    font-size: 13px; font-weight: 700;
    line-height: 1.3; margin-bottom: 5px;
    color: var(--text);
  }
  .desc-text p {
    font-size: 11px; color: var(--muted); line-height: 1.5;
  }

  /* ── CHART AREA ── */
  .chart-wrap {
    position: relative;
    width: 100%; max-width: 390px;
    margin: 8px auto 0;
    aspect-ratio: 1;
    user-select: none;
  }
  .chart-wrap.forecast {
    max-width: 260px;
    margin: 4px auto 0;
  }
  .chart-wrap.compact {
    max-width: 270px;
    margin: 6px auto 0;
  }
  .chart-wrap img {
    width: 100%; height: 100%;
    object-fit: contain; display: block;
    pointer-events: none;
  }
  .chart-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .zone {
    fill: transparent; stroke: none;
    cursor: pointer; transition: fill 0.15s;
  }
  .zone:hover    { fill: rgba(255,255,255,0.05); }
  .zone.targeted { fill: rgba(255,255,255,0.09); }

  .marker-group { cursor: pointer; }
  .marker-group text { transition: opacity 0.2s; }
  .marker-group:hover text { opacity: 0.6; }

  .chart-hint {
    text-align: center; font-size: 12px;
    color: var(--muted); margin: 5px 0 3px;
    letter-spacing: 0.03em;
  }

  /* ── PLANET TRAY ── */
  .planet-tray {
    display: flex; gap: 16px;
    justify-content: center;
    padding: 6px 20px 4px;
  }
  .planet-token {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    cursor: pointer; transition: opacity 0.2s;
  }
  .planet-token.placed { opacity: 0.3; }
  .planet-token.selected .token-circle {
    box-shadow: 0 0 0 2.5px var(--hi);
    background: var(--hi-dim);
  }
  .token-circle {
    width: 68px; height: 68px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    transition: box-shadow 0.2s, background 0.2s;
  }
  .token-label {
    font-size: 10px; letter-spacing: 0.1em;
    color: var(--muted); text-transform: uppercase;
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    width: 100%; max-width: 430px;
    display: flex; gap: 12px;
    padding: 10px 20px 28px;
  }
  .btn-clues {
    flex: 1; display: flex;
    align-items: center; justify-content: center; gap: 8px;
    padding: 14px 10px;
    border: 1.5px solid var(--border); border-radius: 14px;
    background: var(--surface); color: var(--text);
    font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
  }
  .btn-clues img { width: 22px; height: 22px; object-fit: contain; }
  .btn-clues:hover { border-color: rgba(255,255,255,0.4); background: var(--hi-dim); }

  .btn-check {
    flex: 1; padding: 14px; border-radius: 14px;
    background: var(--surface); color: var(--muted);
    font-size: 15px; font-weight: 600; letter-spacing: 0.04em;
    cursor: not-allowed; border: 1.5px solid var(--border);
    transition: background 0.3s, color 0.3s, border-color 0.3s;
  }
  .btn-check.ready {
    background: var(--hi); color: #0a0a0a;
    cursor: pointer; border-color: var(--hi);
  }

  /* ── OVERLAYS ── */
  .overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    flex-direction: column; justify-content: flex-end;
  }
  .overlay.open { display: flex; }

  .sheet {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    border-top: 1px solid var(--border);
    padding: 20px 20px 40px;
    max-height: 90dvh; overflow-y: auto;
  }
  .sheet-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 0 auto 20px;
  }

  /* ── RESULTS ── */
  .results-title { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .results-subtitle { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 14px; }

  .result-chart-wrap {
    position: relative;
    width: 100%; max-width: 310px;
    margin: 0 auto 14px;
    aspect-ratio: 1;
  }
  .result-chart-wrap img {
    width: 100%; height: 100%;
    object-fit: contain; display: block;
    pointer-events: none;
  }
  .result-chart-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  .result-summary {
    font-size: 13px; line-height: 1.65;
    color: var(--muted);
    padding: 14px 16px;
    background: var(--bg);
    border-radius: 14px;
    border: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .btn-next {
    width: 100%; margin-top: 16px; padding: 16px;
    border-radius: 14px; border: none;
    background: var(--hi); color: #0a0a0a;
    font-size: 16px; font-weight: 700;
    letter-spacing: 0.04em; cursor: pointer;
  }

  /* ── CLUES ── */
  .clues-title { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 16px; }
  .clue-item {
    display: flex; align-items: center; gap: 12px; padding: 14px;
    background: var(--bg); border-radius: 14px;
    border: 1px solid var(--border); margin-bottom: 10px;
    cursor: pointer; transition: border-color 0.2s;
  }
  .clue-item.locked   { opacity: 0.4; cursor: default; }
  .clue-item.revealed { border-color: rgba(255,255,255,0.35); cursor: default; }
  .clue-num {
    width: 30px; height: 30px; border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .clue-item.revealed .clue-num { border-color: rgba(255,255,255,0.5); color: var(--hi); }
  .clue-text { font-size: 13px; line-height: 1.5; color: var(--muted); }
  .clue-item.revealed .clue-text { color: var(--text); }
  .clues-used { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .btn-close-clues {
    width: 100%; margin-top: 6px; padding: 14px;
    border-radius: 14px; border: 1.5px solid var(--border);
    background: transparent; color: var(--text);
    font-size: 15px; font-weight: 600; cursor: pointer;
  }

  /* ── SUSPECT ── */
  .suspect-label {
    text-align: center; font-size: 11px;
    letter-spacing: 0.1em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .suspect-circle-wrap { display: flex; justify-content: center; padding: 4px 0 8px; }
  .suspect-circle {
    width: 72px; height: 72px; border-radius: 50%;
    border: 1.5px solid var(--border); background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; transition: border-color 0.2s;
  }
  .suspect-circle.has-suspect { border-color: rgba(255,255,255,0.5); }

  /* ── TITLE SCREEN ── */
  #titleScreen {
    position: fixed; inset: 0; z-index: 200;
    display: flex; flex-direction: column;
    align-items: center; justify-content: space-between;
    background: var(--bg);
    overflow: hidden;
    padding-bottom: 52px;
  }
  .title-img-wrap {
    flex: 1; display: flex;
    align-items: center; justify-content: center;
    width: 100%; overflow: hidden;
    min-height: 0;
  }
  .title-img {
    max-width: 100%; max-height: 100%;
    object-fit: contain; display: block;
  }
  .title-content {
    width: 100%; max-width: 430px;
    padding: 0 24px;
    display: flex; flex-direction: column; align-items: center;
    flex-shrink: 0;
  }
  .title-buttons {
    width: 100%; display: flex; flex-direction: column; gap: 12px;
  }
  .btn-title-primary {
    width: 100%; padding: 17px;
    border-radius: 16px; border: none;
    background: #ffffff; color: #0a0a0a;
    font-size: 16px; font-weight: 700;
    letter-spacing: 0.04em; cursor: pointer;
    transition: transform 0.12s, opacity 0.12s;
  }
  .btn-title-primary:active { transform: scale(0.97); opacity: 0.88; }
  .btn-title-secondary {
    width: 100%; padding: 17px;
    border-radius: 16px; border: 1.5px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.75);
    font-size: 16px; font-weight: 600;
    letter-spacing: 0.04em; cursor: pointer;
    transition: transform 0.12s, border-color 0.2s;
  }
  .btn-title-secondary:active { transform: scale(0.97); }

  /* ── CHARACTER SELECT ── */
  .char-panel {
    margin: 10px 20px 0;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    min-height: 80px;
    display: flex;
    align-items: flex-start;
  }
  #charPanelText,
  #charPanelTextBelow {
    font-size: 13px;
    line-height: 1.6;
    color: var(--muted);
    transition: color 0.2s;
  }
  #charPanelText.has-story,
  #charPanelTextBelow.has-story {
    color: var(--text);
  }
  .char-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 12px 20px 4px;
  }
  .char-head {
    cursor: pointer;
    border-radius: 50%;
    overflow: hidden;
    border: 2.5px solid transparent;
    aspect-ratio: 1;
    transition: border-color 0.2s, box-shadow 0.2s;
    background: var(--surface);
  }
  .char-head img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .char-head.selected {
    border-color: var(--hi);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.12);
  }

  /* ── CHARACTER RESULT GRID ── */
  .char-result-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 4px 0 14px;
  }
  .char-result-head {
    border-radius: 50%;
    overflow: hidden;
    border: 2.5px solid transparent;
    aspect-ratio: 1;
  }
  .char-result-head img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .char-result-head.correct {
    border-color: var(--hi);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.12);
  }
  .char-result-head.incorrect {
    opacity: 0.2;
  }
  .char-result-head.user-wrong {
    border-color: rgba(220,70,70,0.8);
    opacity: 0.5;
  }

  /* ── QUESTION HEAD PANEL ── */
  .question-head-wrap {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
  }
  .question-head-img {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.15);
  }
  .question-answer-badge {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 10px 14px;
    min-height: 52px;
    display: flex;
    align-items: center;
  }
  .question-answer-badge p {
    margin: 0;
    font-size: 13px;
    color: rgba(255,255,255,0.65);
    line-height: 1.45;
  }
  .question-answer-badge.has-answer p {
    color: rgba(255,255,255,0.92);
  }

  /* ── FORECAST PANEL ── */
  .forecast-situation-wrap {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 20px 0;
  }
  .forecast-char-img {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.15);
  }
  .forecast-situation-text {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 10px 12px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
  }
  .forecast-question {
    font-size: 11px;
    color: var(--muted);
    padding: 6px 16px 2px;
    line-height: 1.4;
  }
  .forecast-options {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 0 16px 8px;
  }
  .forecast-option {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    padding: 9px 12px;
    text-align: left;
    color: var(--text);
    font-size: 12px;
    line-height: 1.45;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  .forecast-option:active { background: rgba(255,255,255,0.08); }
  .forecast-option.selected {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.45);
  }
  .forecast-option-letter {
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    padding-top: 1px;
    min-width: 12px;
  }
  .forecast-option.selected .forecast-option-letter {
    color: var(--hi);
  }

  /* ── QUESTION LIST (in modal) ── */
  .question-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    cursor: pointer;
  }
  .question-item:active { background: rgba(255,255,255,0.04); }
  .question-item.asked { cursor: default; }
  .question-q {
    font-size: 14px;
    color: rgba(255,255,255,0.85);
  }
  .question-item.asked .question-q {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
  }
  .question-a {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    line-height: 1.4;
    border-left: 2px solid rgba(255,255,255,0.2);
    padding-left: 8px;
  }

  /* ── QUESTION ROUNDS PANEL ── */
  #questionRoundsPanel {
    width: 100%;
    max-width: 430px;
    padding: 4px 16px 0;
  }
  .round-indicator {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  #roundQuestionsList {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .round-btn {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 12px;
    padding: 10px 12px;
    text-align: left;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    cursor: pointer;
    display: block;
    margin-bottom: 0;
    line-height: 1.35;
    font-family: inherit;
  }
  .round-btn:active {
    background: rgba(255,255,255,0.12);
  }
</style>
</head>
<body>

<!-- ── TITLE SCREEN ── -->
<div id="titleScreen">
  <div class="title-img-wrap">
    <img class="title-img" src="Home picture.jpg" alt="Stellar Detective">
  </div>
  <div class="title-content">
    <div class="title-buttons">
      <button class="btn-title-primary" onclick="startRevealMode()">☽ Раскрыть карту</button>
      <button class="btn-title-secondary" onclick="startLearningMode()">✦ Обучение</button>
    </div>
  </div>
</div>

<!-- ── HEADER ── -->
<div class="header">
  <div class="header-top">
    <button class="btn-home" onclick="goHome()" title="На главную">←</button>
    <span class="case-label" id="caseLabel">Кейс №2350</span>
    <span class="case-title" id="caseSubtitle">Разгадайте натальную карту по описанию</span>
    <span class="case-counter" id="counter">0/3</span>
  </div>
  <div class="progress-bar" id="progressBar"></div>
</div>

<!-- ── DESCRIPTION CARD ── -->
<div class="desc-card">
  <div class="desc-icon">
    <img id="descCharImg" src="Character 3.png" alt="">
  </div>
  <div class="desc-text">
    <h2 id="caseTitle"></h2>
    <p id="caseBody"></p>
  </div>
</div>

<!-- ── CHAR PANEL ABOVE CHART (character task only) ──
     To revert: remove this block and restore .char-panel inside #charSelectSection -->
<div id="charPanelAbove" style="display:none">
  <div class="char-panel">
    <p id="charPanelText">Тапните на персонажа, чтобы узнать его историю</p>
  </div>
</div>

<!-- ── CHART ── -->
<div class="chart-wrap" id="chartWrap">
  <img src="Natal Chat Circle 2.png" alt="Натальная карта" id="chartImg">
  <svg class="chart-svg" id="chartSvg" viewBox="0 0 390 390"></svg>
</div>
<p class="chart-hint" id="chartHint">Расположите планеты на карте</p>

<!-- ── SUSPECT SECTION (planet_identify task) ── -->
<div id="suspectSection" style="display:none">
  <p class="suspect-label">Подозреваемый</p>
  <div class="suspect-circle-wrap">
    <div class="suspect-circle" id="suspectCircle">
      <span id="suspectSymbol"></span>
    </div>
  </div>
</div>

<!-- ── PLANET TRAY (dynamic) ── -->
<div class="planet-tray" id="planetTray"></div>

<!-- ── QUESTION HEAD PANEL (question_rounds / question_select task) ── -->
<div id="questionHeadPanel" style="display:none">
  <div class="question-head-wrap">
    <img class="question-head-img" id="questionHeadImg" src="" alt="">
    <div class="question-answer-badge">
      <p id="questionAnswerText">Спроси меня и я всё отвечу</p>
    </div>
  </div>
</div>

<!-- ── QUESTION ROUNDS PANEL (question_rounds task) ── -->
<div id="questionRoundsPanel" style="display:none">
  <div class="round-indicator" id="roundIndicator"></div>
  <div id="roundQuestionsList"></div>
</div>

<!-- ── FORECAST PANEL ── -->
<div id="forecastPanel" style="display:none">
  <p class="forecast-question" id="forecastQuestion"></p>
  <div class="forecast-options" id="forecastOptions"></div>
</div>

<!-- ── CHARACTER SELECT SECTION (below chart) ── -->
<div id="charSelectSection" style="display:none">
  <!-- Panel below chart — shown when task.panelAbove = false -->
  <div class="char-panel" id="charPanelBelow" style="display:none">
    <p id="charPanelTextBelow">Тапните на персонажа, чтобы узнать его историю</p>
  </div>
  <div class="char-grid" id="charGrid"></div>
</div>

<!-- ── BOTTOM BAR ── -->
<div class="bottom-bar">
  <button class="btn-clues" id="btnClues" onclick="openClues()">
    <img src="Evidence.png" alt="">
    ОТКРЫТЬ УЛИКИ

  { id: 'aquarius',    label: 'Водолей',  prep: 'Водолее',   symbol: '♒', startDeg:  90 }, // 6→7h   H4
  { id: 'capricorn',   label: 'Козерог',  prep: 'Козероге',  symbol: '♑', startDeg: 120 }, // 7→8h   H3
  { id: 'sagittarius', label: 'Стрелец',  prep: 'Стрельце',  symbol: '♐', startDeg: 150 }, // 8→9h   H2
];

const CX = 195, CY = 195;
const R_OUTER = 188;
const R_INNER = 70;
const R_MARKER = 108;

// ── STATE ─────────────────────────────────────────────────────────
let caseIdx = 0;
let taskMode = 'reveal';       // 'learn' | 'reveal'
let selectedPlanet = null;
let selectedCharacter = null;
let selectedSuspect = null;
let selectedErrorPlanet = null;
let errorPlanetPlacement = null;
let placements = {};           // { planetId: signId }
let cluesRevealed = 0;
let questionsAsked = [];       // array of asked question ids (question_select)
let currentRound = 0;          // current round index (question_rounds)
let roundsAsked = 0;           // how many rounds answered (question_rounds)

function getCase() {
  return (taskMode === 'learn' ? LEARNING_CASES : CASES)[caseIdx];
}

// ── HELPERS ───────────────────────────────────────────────────────
function degToRad(d) { return d * Math.PI / 180; }

function polarToXY(cx, cy, r, angleDeg) {
  const rad = degToRad(angleDeg);
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function sectorPath(cx, cy, rO, rI, s, e) {
  const p1 = polarToXY(cx, cy, rO, s), p2 = polarToXY(cx, cy, rO, e);
  const p3 = polarToXY(cx, cy, rI, e), p4 = polarToXY(cx, cy, rI, s);
  const lg = (e - s) > 180 ? 1 : 0;
  return `M ${p1.x} ${p1.y} A ${rO} ${rO} 0 ${lg} 1 ${p2.x} ${p2.y} L ${p3.x} ${p3.y} A ${rI} ${rI} 0 ${lg} 0 ${p4.x} ${p4.y} Z`;
}

// ── BUILD SVG ZONES ───────────────────────────────────────────────
function buildZones() {
  const svg = document.getElementById('chartSvg');
  svg.innerHTML = '';
  SIGNS.forEach(sign => {
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', sectorPath(CX, CY, R_OUTER, R_INNER, sign.startDeg, sign.startDeg + 30));
    path.setAttribute('class', 'zone');
    path.setAttribute('data-sign', sign.id);
    path.addEventListener('click', () => placeOnZone(sign.id));
    svg.appendChild(path);
  });
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.id = 'markersGroup';
  svg.appendChild(g);
}

// ── RENDER MARKERS ────────────────────────────────────────────────
function renderMarkers() {
  const c = getCase();
  const g = document.getElementById('markersGroup');
  g.innerHTML = '';

  const allPlacements = { ...(c.prePlaced || {}), ...placements };
  if (c.type === 'find_error' && selectedErrorPlanet && errorPlanetPlacement) {
    allPlacements[selectedErrorPlanet] = errorPlanetPlacement;
  }

  const bySign = {};
  Object.entries(allPlacements).forEach(([planet, signId]) => {
    if (!bySign[signId]) bySign[signId] = [];
    bySign[signId].push({ planet, isPrePlaced: !!(c.prePlaced?.[planet]) });
  });

  const markerPos = {};
  Object.entries(bySign).forEach(([signId, items]) => {
    const sign = SIGNS.find(s => s.id === signId);
    if (!sign) return;
    const n = items.length;
    items.forEach((item, i) => {
      const mid    = sign.startDeg + 15;
      const spread = n === 1 ? 0 : (n === 2 ? 9 : 10);
      const offset = n === 1 ? 0 : (i - (n - 1) / 2) * spread;
      markerPos[item.planet] = polarToXY(CX, CY, R_MARKER, mid + offset);
    });
  });

  (c.aspects || []).forEach(asp => {
    const p1 = markerPos[asp.planet1], p2 = markerPos[asp.planet2];
    if (!p1 || !p2) return;
    const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    ln.setAttribute('x1', p1.x); ln.setAttribute('y1', p1.y);
    ln.setAttribute('x2', p2.x); ln.setAttribute('y2', p2.y);
    ln.setAttribute('stroke', 'rgba(255,255,255,0.35)');
    ln.setAttribute('stroke-width', '1.5');
    g.appendChild(ln);
  });

  Object.entries(bySign).forEach(([signId, items]) => {
    items.forEach(item => {
      const info = PLANET_INFO[item.planet];
      const pos  = markerPos[item.planet];

      const grp = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      grp.setAttribute('class', 'marker-group');
      if (c.type === 'planet_identify') {
        grp.addEventListener('click', e => { e.stopPropagation(); selectSuspect(item.planet); });
      } else if (c.type === 'find_error') {
        grp.addEventListener('click', e => { e.stopPropagation(); selectErrorPlanet(item.planet); });
      } else if (!item.isPrePlaced && c.type !== 'characterSelect') {
        grp.addEventListener('click', e => { e.stopPropagation(); selectPlanet(item.planet); });
      }

      if (c.type === 'planet_identify') {
        const hit = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        hit.setAttribute('cx', pos.x); hit.setAttribute('cy', pos.y); hit.setAttribute('r', 22);
        hit.setAttribute('fill', 'transparent');
        hit.setAttribute('pointer-events', 'all');
        grp.appendChild(hit);

        if (selectedSuspect === item.planet) {
          const hl = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          hl.setAttribute('cx', pos.x); hl.setAttribute('cy', pos.y); hl.setAttribute('r', 16);
          hl.setAttribute('fill', 'rgba(255,255,255,0.12)');
          hl.setAttribute('stroke', 'rgba(255,255,255,0.5)'); hl.setAttribute('stroke-width', '1.5');
          hl.setAttribute('pointer-events', 'none');
          grp.appendChild(hl);
        }
      }

      if (c.type === 'find_error') {
        const hit = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        hit.setAttribute('cx', pos.x); hit.setAttribute('cy', pos.y); hit.setAttribute('r', 22);
        hit.setAttribute('fill', 'transparent');
        hit.setAttribute('pointer-events', 'all');
        grp.appendChild(hit);

        if (selectedErrorPlanet === item.planet) {
          const hl = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          hl.setAttribute('cx', pos.x); hl.setAttribute('cy', pos.y); hl.setAttribute('r', 16);
          hl.setAttribute('fill', 'rgba(255,255,255,0.12)');
          hl.setAttribute('stroke', 'rgba(255,255,255,0.5)'); hl.setAttribute('stroke-width', '1.5');
          hl.setAttribute('pointer-events', 'none');
          grp.appendChild(hl);
        }
      }

      const fillColor = c.type === 'planet_identify'
        ? (selectedSuspect === item.planet ? '#ffffff' : 'rgba(255,255,255,0.5)')
        : c.type === 'find_error'
          ? (selectedErrorPlanet === item.planet ? '#ffffff' : 'rgba(255,255,255,0.5)')
        : (item.isPrePlaced ? 'rgba(255,255,255,0.35)' : info.color);

      const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      txt.setAttribute('x', pos.x);
      txt.setAttribute('y', pos.y + 7);
      txt.setAttribute('text-anchor', 'middle');
      txt.setAttribute('font-size', '20');
      txt.setAttribute('fill', fillColor);
      txt.setAttribute('pointer-events', 'none');
      txt.textContent = info.symbol;
      grp.appendChild(txt);
      g.appendChild(grp);
    });
  });
}

// ── PLANET TRAY ───────────────────────────────────────────────────
function renderTray() {
  const c = getCase();
  const tray = document.getElementById('planetTray');
  tray.innerHTML = (c.planets || []).map(p => {
    const info = PLANET_INFO[p];
    return `
      <div class="planet-token" data-planet="${p}" onclick="selectPlanet('${p}')">
        <div class="token-circle">${info.symbol}</div>
        <span class="token-label">${info.label}</span>
      </div>`;
  }).join('');
}

// ── PLANET SELECTION ──────────────────────────────────────────────
function selectPlanet(planet) {
  const token = document.querySelector(`[data-planet="${planet}"]`);

  if (placements[planet]) {
    delete placements[planet];
    token.classList.remove('placed');
    renderMarkers();
    updateProgress();
  }

  if (selectedPlanet === planet) {
    token.classList.remove('selected');
    selectedPlanet = null;
    clearZoneHighlights();
    return;
  }

  if (selectedPlanet) {
    document.querySelector(`[data-planet="${selectedPlanet}"]`)?.classList.remove('selected');
  }

  selectedPlanet = planet;
  token.classList.add('selected');
  highlightZones(true);
}

function highlightZones(on) {
  document.querySelectorAll('.zone').forEach(z => z.classList.toggle('targeted', on));
}
function clearZoneHighlights() {
  document.querySelectorAll('.zone').forEach(z => z.classList.remove('targeted'));
}

// ── PLACE PLANET ──────────────────────────────────────────────────
function placeOnZone(signId) {
  const c = getCase();
  if (c.type === 'find_error') {
    if (!selectedErrorPlanet) return;
    errorPlanetPlacement = signId;
    clearZoneHighlights();
    document.getElementById('progressBar').innerHTML = '<div class="seg filled"></div><div class="seg filled"></div>';
    const btn = document.getElementById('btnCheck');
    btn.classList.add('ready');
    btn.disabled = false;
    renderMarkers();
    return;
  }
  if (!selectedPlanet) return;
  const token = document.querySelector(`[data-planet="${selectedPlanet}"]`);
  placements[selectedPlanet] = signId;
  token.classList.remove('selected');
  token.classList.add('placed');
  selectedPlanet = null;
  clearZoneHighlights();
  renderMarkers();
  updateProgress();
}

// ── PROGRESS ──────────────────────────────────────────────────────
function updateProgress() {
  const c = getCase();
  const total = (c.planets || []).length;
  const placed = Object.keys(placements).length;
  document.getElementById('counter').textContent = `${placed}/${total}`;

  const bar = document.getElementById('progressBar');
  bar.innerHTML = (c.planets || []).map((_, i) =>
    `<div class="seg${i < placed ? ' filled' : ''}"></div>`
  ).join('');

  const ready = placed === total;
  const btn = document.getElementById('btnCheck');
  btn.classList.toggle('ready', ready);
  btn.disabled = !ready;
}

// ── CHECK ──────────────────────────────────────────────────────────
function checkAnswers() {
  const c = getCase();
  if (c.type === 'forecast') {
    checkForecastTask(c);
    return;
  }
  if (c.type === 'characterSelect') {
    checkCharacterTask(c);
    return;
  }
  if (c.type === 'planet_identify') {
    checkPlanetIdentifyTask(c);
    return;
  }
  if (c.type === 'find_error') {
    checkFindErrorTask(c);
    return;
  }
  if (c.type === 'question_select') {
    checkQuestionTask(c);
    return;
  }
  if (c.type === 'question_rounds') {
    checkQuestionRoundsTask(c);
    return;
  }

  if (Object.keys(placements).length < c.planets.length) return;

  let correct = 0;
  c.planets.forEach(p => { if (placements[p] === c.answer[p]) correct++; });
  const total = c.planets.length;

  document.getElementById('resultsTitle').textContent =
    correct === total ? `${correct} из ${total} — Блестяще!` : `${correct} из ${total}`;
  document.getElementById('resultsSubtitle').textContent =
    correct === total ? 'Вы отлично чувствуете натальную карту.' :
    correct >= total / 2 ? 'Почти угадали всё.' : 'Есть куда расти.';

  renderResultChart(c, placements);

  const summaryEl = document.getElementById('resultSummary');
  summaryEl.textContent = c.summary || '';
  summaryEl.style.display = c.summary ? 'block' : 'none';

  document.getElementById('charResultGrid').style.display = 'none';
  document.getElementById('resultsOverlay').classList.add('open');
}

function checkCharacterTask(task) {
  const isCorrect = selectedCharacter === task.correctCharacter;
  const correctChar = task.characters[task.correctCharacter];

  document.getElementById('resultsTitle').textContent = isCorrect ? 'Верно!' : 'Не совсем';
  document.getElementById('resultsSubtitle').textContent = isCorrect
    ? 'Вы правильно определили владельца карты.'
    : 'Вот кто на самом деле владеет этой картой.';

  renderCharResultChart(task);

  const gridEl = document.getElementById('charResultGrid');
  gridEl.style.display = '';
  gridEl.innerHTML = '<div class="char-result-grid">' + task.characters.map((char, i) => {
    let cls = 'char-result-head';
    if (i === task.correctCharacter) cls += ' correct';
    else if (i === selectedCharacter) cls += ' user-wrong';
    else cls += ' incorrect';
    return `<div class="${cls}"><img src="${char.img}" alt="Персонаж ${i + 1}"></div>`;
  }).join('') + '</div>';

  const summaryEl = document.getElementById('resultSummary');
  summaryEl.textContent = correctChar.text;
  summaryEl.style.display = 'block';

}

function renderResultChart(c, userPlacements) {
  const svgEl = document.getElementById('resultSvg');
  svgEl.innerHTML = '';

  const allCorrect = { ...(c.prePlaced || {}), ...c.answer };
  const correctBySign = {};
  Object.entries(allCorrect).forEach(([planet, signId]) => {
    if (!correctBySign[signId]) correctBySign[signId] = [];
    correctBySign[signId].push(planet);
  });
  const markerPos = {};
  Object.entries(correctBySign).forEach(([signId, planets]) => {
    const sign = SIGNS.find(s => s.id === signId);
    if (!sign) return;
    const n = planets.length;
    planets.forEach((planet, i) => {
      const mid    = sign.startDeg + 15;
      const spread = n === 1 ? 0 : n === 2 ? 9 : 10;
      const offset = n === 1 ? 0 : (i - (n - 1) / 2) * spread;
      markerPos[planet] = polarToXY(CX, CY, R_MARKER, mid + offset);
    });
  });

  const gLines = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  (c.aspects || []).forEach(asp => {
    const p1 = markerPos[asp.planet1], p2 = markerPos[asp.planet2];
    if (!p1 || !p2) return;
    const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    ln.setAttribute('x1', p1.x); ln.setAttribute('y1', p1.y);
    ln.setAttribute('x2', p2.x); ln.setAttribute('y2', p2.y);
    ln.setAttribute('stroke', 'rgba(255,255,255,0.4)');
    ln.setAttribute('stroke-width', '1.5');
    gLines.appendChild(ln);
  });
  svgEl.appendChild(gLines);

  const allMarkers = [];
  Object.entries(c.prePlaced || {}).forEach(([planet, signId]) => {
    allMarkers.push({ planet, signId, isCorrect: true });
  });
  c.planets.forEach(planet => {
    const correctSign = c.answer[planet];
    const userSign    = userPlacements[planet];
    allMarkers.push({ planet, signId: correctSign, isCorrect: true });
    if (userSign !== correctSign) {
      allMarkers.push({ planet, signId: userSign, isCorrect: false });
    }
  });

  const markersBySign = {};
  allMarkers.forEach(m => {
    if (!markersBySign[m.signId]) markersBySign[m.signId] = [];
    markersBySign[m.signId].push(m);
  });

  const gM = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  Object.entries(markersBySign).forEach(([signId, markers]) => {
    const sign = SIGNS.find(s => s.id === signId);
    if (!sign) return;
    const n = markers.length;
    markers.forEach((m, i) => {
      const mid    = sign.startDeg + 15;
      const spread = n === 1 ? 0 : n === 2 ? 9 : 10;
      const offset = n === 1 ? 0 : (i - (n - 1) / 2) * spread;
      const pos    = polarToXY(CX, CY, R_MARKER, mid + offset);
      const info   = PLANET_INFO[m.planet];

      if (m.isCorrect) {
        const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circ.setAttribute('cx', pos.x); circ.setAttribute('cy', pos.y);
        circ.setAttribute('r', 15);
        circ.setAttribute('fill', 'rgba(255,255,255,0.15)');
        circ.setAttribute('stroke', 'rgba(255,255,255,0.75)');
        circ.setAttribute('stroke-width', '1.5');
        gM.appendChild(circ);
        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('x', pos.x); t.setAttribute('y', pos.y + 7);
        t.setAttribute('text-anchor', 'middle');
        t.setAttribute('font-size', '19'); t.setAttribute('fill', '#ffffff');
        t.textContent = info.symbol;
        gM.appendChild(t);
      } else {
        const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circ.setAttribute('cx', pos.x); circ.setAttribute('cy', pos.y);
        circ.setAttribute('r', 15);
        circ.setAttribute('fill', 'rgba(180,40,40,0.25)');
        circ.setAttribute('stroke', 'rgba(220,70,70,0.8)');
        circ.setAttribute('stroke-width', '1.5');
        gM.appendChild(circ);
        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('x', pos.x); t.setAttribute('y', pos.y + 7);
        t.setAttribute('text-anchor', 'middle');
        t.setAttribute('font-size', '19'); t.setAttribute('fill', 'rgba(220,80,80,0.6)');
        t.textContent = info.symbol;
        gM.appendChild(t);
        const d = 9;
        [[pos.x-d,pos.y-d,pos.x+d,pos.y+d],[pos.x+d,pos.y-d,pos.x-d,pos.y+d]].forEach(([x1,y1,x2,y2]) => {
          const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          l.setAttribute('x1',x1); l.setAttribute('y1',y1);
          l.setAttribute('x2',x2); l.setAttribute('y2',y2);
          l.setAttribute('stroke','rgba(220,60,60,0.95)');
          l.setAttribute('stroke-width','2'); l.setAttribute('stroke-linecap','round');
          gM.appendChild(l);
        });
      }
    });
  });
  svgEl.appendChild(gM);
}

// ── FORECAST TASK ─────────────────────────────────────────────────

function selectForecastOption(id) {
  selectedForecastOption = id;

}

function checkForecastTask(task) {

  const isCorrect = selectedForecastOption === task.correctOption;
  const letters = ['А', 'Б', 'В', 'Г'];
  const correctIdx = task.options.findIndex(o => o.id === task.correctOption);
  const correctLetter = letters[correctIdx];

  document.getElementById('resultsTitle').textContent = isCorrect ? 'Верно!' : 'Не совсем';
  document.getElementById('resultsSubtitle').textContent = isCorrect
    ? 'Ты точно прочитал карту'
    : `Правильный ответ: ${correctLetter}`;

  document.querySelector('.result-chart-wrap').style.display = 'none';

  const summaryEl = document.getElementById('resultSummary');
  summaryEl.textContent = task.explanation;
  summaryEl.style.display = 'block';

  document.getElementById('charResultGrid').style.display = 'none';
  document.getElementById('resultsOverlay').classList.add('open');
}

// ── NEXT CASE ─────────────────────────────────────────────────────
function nextCase() {
  const cases = taskMode === 'learn' ? LEARNING_CASES : CASES;
  caseIdx = (caseIdx + 1) % cases.length;

// ── CLUES ─────────────────────────────────────────────────────────
function renderClues() {
  const c = getCase();
  document.getElementById('clueList').innerHTML = (c.clues || []).map((clue, i) => {
    const revealed = i < cluesRevealed;
    const locked   = !revealed && i > cluesRevealed;
    return `
      <div class="clue-item ${revealed ? 'revealed' : ''} ${locked ? 'locked' : ''}"
           onclick="${!revealed && !locked ? `revealClue(${i})` : ''}">
        <div class="clue-num">${i + 1}</div>
        <div class="clue-text">${revealed ? clue : locked ? '🔒 Сначала откройте предыдущую' : '👆 Нажмите, чтобы открыть'}</div>
      </div>`;
  }).join('');
  document.getElementById('cluesUsed').textContent = `Использовано: ${cluesRevealed} из ${(c.clues || []).length}`;
}

function revealClue(idx) {
  if (idx !== cluesRevealed) return;
  cluesRevealed++;
  renderClues();
}

function renderPlanetIdentifyResultChart(task) {
  const svgEl = document.getElementById('resultSvg');
  svgEl.innerHTML = '';

  const bySign = {};
  Object.entries(task.prePlaced).forEach(([planet, signId]) => {
    if (!bySign[signId]) bySign[signId] = [];
    bySign[signId].push(planet);
  });

  const gM = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  Object.entries(bySign).forEach(([signId, planets]) => {
    const sign = SIGNS.find(s => s.id === signId);
    if (!sign) return;
    const n = planets.length;
    planets.forEach((planet, i) => {
      const mid    = sign.startDeg + 15;
      const spread = n === 1 ? 0 : n === 2 ? 9 : 10;
      const offset = n === 1 ? 0 : (i - (n - 1) / 2) * spread;
      const pos    = polarToXY(CX, CY, R_MARKER, mid + offset);
      const info   = PLANET_INFO[planet];
      const isAnswer   = planet === task.answer;
      const isUserWrong = planet === selectedSuspect && !isAnswer;

      const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circ.setAttribute('cx', pos.x); circ.setAttribute('cy', pos.y); circ.setAttribute('r', 15);
      if (isAnswer) {
        circ.setAttribute('fill', 'rgba(255,255,255,0.15)');
        circ.setAttribute('stroke', 'rgba(255,255,255,0.75)');
      } else if (isUserWrong) {
        circ.setAttribute('fill', 'rgba(180,40,40,0.25)');
        circ.setAttribute('stroke', 'rgba(220,70,70,0.8)');
      } else {
        circ.setAttribute('fill', 'rgba(255,255,255,0.04)');
        circ.setAttribute('stroke', 'rgba(255,255,255,0.15)');
      }
      circ.setAttribute('stroke-width', '1.5');
      gM.appendChild(circ);

      const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', pos.x); t.setAttribute('y', pos.y + 7);
      t.setAttribute('text-anchor', 'middle');
      t.setAttribute('font-size', '19');
      t.setAttribute('fill', isAnswer ? '#ffffff' : isUserWrong ? 'rgba(220,80,80,0.6)' : 'rgba(255,255,255,0.2)');
      t.textContent = info.symbol;
      gM.appendChild(t);

      if (isUserWrong) {
        const d = 9;
        [[pos.x-d,pos.y-d,pos.x+d,pos.y+d],[pos.x+d,pos.y-d,pos.x-d,pos.y+d]].forEach(([x1,y1,x2,y2]) => {
          const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          l.setAttribute('x1',x1); l.setAttribute('y1',y1);
          l.setAttribute('x2',x2); l.setAttribute('y2',y2);
          l.setAttribute('stroke','rgba(220,60,60,0.95)');
          l.setAttribute('stroke-width','2'); l.setAttribute('stroke-linecap','round');
          gM.appendChild(l);
        });
      }
    });
  });
  svgEl.appendChild(gM);
}

function renderRoundQuestions() {
  const task = getCase();
  const rounds = task.rounds;
  const roundIdx = currentRound % rounds.length;
  const round = rounds[roundIdx];

  document.getElementById('roundIndicator').textContent =
    `Раунд ${roundIdx + 1} из ${rounds.length}`;

  document.getElementById('roundQuestionsList').innerHTML = round.questions.map(q =>
    `<button class="round-btn" onclick="askRoundQuestion('${q.id}')">${q.question}</button>`
  ).join('');
}

function askRoundQuestion(qId) {
  const task = getCase();
  let found = null;
  for (const round of task.rounds) {
    found = round.questions.find(q => q.id === qId);
    if (found) break;
  }
  if (!found) return;

  const badge = document.querySelector('.question-answer-badge');
  badge.classList.add('has-answer');
  document.getElementById('questionAnswerText').textContent = found.answer;

  currentRound++;
  roundsAsked++;
  renderRoundQuestions();
}

function checkQuestionRoundsTask(task) {
  const isCorrect = task.planets.every(p => placements[p] === task.answer[p]);
  const n = roundsAsked;
  const scoreKey = String(Math.min(n, 4) || 1);
  const scoreLevel = task.scoring.rounds_used[scoreKey] || 'slow';
  const labelMap = { perfect: '— Блестяще!', good: '— Хорошо!', ok: '— Неплохо', slow: '— Долго думал' };

  document.getElementById('resultsTitle').textContent =
    isCorrect ? `Верно! ${labelMap[scoreLevel]}` : 'Не совсем';
  document.getElementById('resultsSubtitle').textContent =
    n ? `Вопросов задано: ${n}` : 'Без вопросов — смело!';

  renderResultChart(task, placements);

  const summaryEl = document.getElementById('resultSummary');
  summaryEl.textContent = task.explanations.venus || '';
  summaryEl.style.display = 'block';

  document.getElementById('charResultGrid').style.display = 'none';
  document.getElementById('resultsOverlay').classList.add('open');
}

function checkQuestionTask(task) {
  const isCorrect = task.planets.every(p => placements[p] === task.answer[p]);
  const n = questionsAsked.length;

  let scoreLabel;
  if (n <= task.scoring.perfect)            scoreLabel = '— Блестяще!';
  else if (task.scoring.good.includes(n))   scoreLabel = '— Хороший результат';
  else                                       scoreLabel = '— Есть куда расти';

  document.getElementById('resultsTitle').textContent =
    isCorrect ? `Верно! ${scoreLabel}` : 'Не совсем';
  document.getElementById('resultsSubtitle').textContent =
    `Вопросов задано: ${n}`;

  renderResultChart(task, placements);

  const summaryEl = document.getElementById('resultSummary');
  summaryEl.textContent = task.explanations.venus || '';
  summaryEl.style.display = 'block';

  document.getElementById('charResultGrid').style.display = 'none';
  document.getElementById('resultsOverlay').classList.add('open');
}

// ── TITLE SCREEN ──────────────────────────────────────────────────
function setGameVisible(visible) {
  document.querySelectorAll('.header, .desc-card, .chart-wrap, .chart-hint, .planet-tray, .bottom-bar')
    .forEach(el => { el.style.display = visible ? '' : 'none'; });
  if (!visible) {
    document.getElementById('charSelectSection').style.display = 'none';
    document.getElementById('charPanelAbove').style.display = 'none';
    document.getElementById('questionHeadPanel').style.display = 'none';
    document.getElementById('btnQuestions').style.display = 'none';
    document.getElementById('questionRoundsPanel').style.display = 'none';
    document.getElementById('suspectSection').style.display = 'none';
  }
}

function startRevealMode() {
  document.getElementById('titleScreen').style.display = 'none';
  taskMode = 'reveal';
  setGameVisible(true);
  loadCase();
}

function startLearningMode() {
  document.getElementById('titleScreen').style.display = 'none';
  taskMode = 'learn';
  caseIdx = 0;
  setGameVisible(true);
  loadCase();
}

function goHome() {
  document.getElementById('resultsOverlay').classList.remove('open');
  document.getElementById('cluesOverlay').classList.remove('open');
  setGameVisible(false);
  document.getElementById('titleScreen').style.display = '';
  caseIdx = 0;
}

// ── INIT ──────────────────────────────────────────────────────────
buildZones();
setGameVisible(false);
</script>
</body>
</html>
