<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Астро Детектив</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: rgba(255,255,255,0.12);
    --text: #f0ede8;
    --muted: rgba(240,237,232,0.45);
    --accent: rgba(255,255,255,0.06);
    --hi: #ffffff;
    --hi-dim: rgba(255,255,255,0.08);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    overflow-y: auto;
  }

  /* ── HEADER ── */
  .header {
    width: 100%;
    max-width: 430px;
    padding: 14px 20px 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .case-label  { font-size: 12px; color: var(--muted); letter-spacing: 0.05em; }
  .case-title  { font-size: 12px; color: var(--muted); text-align: center; flex: 1; padding: 0 8px; }
  .case-counter{ font-size: 12px; color: var(--muted); }

  .progress-bar { display: flex; gap: 6px; height: 4px; }
  .progress-bar .seg {
    flex: 1; border-radius: 2px;
    background: var(--accent);
    transition: background 0.3s;
  }
  .progress-bar .seg.filled { background: var(--hi); }

  /* ── DESCRIPTION CARD ── */
  .desc-card {
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    gap: 12px;
    align-items: stretch;
    width: calc(100% - 40px);
  }
  .desc-icon {
    width: 72px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--accent);
  }
  .desc-icon img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  .desc-text h2 {
    font-size: 13px; font-weight: 700;
    line-height: 1.3; margin-bottom: 5px;
    color: var(--text);
  }
  .desc-text p {
    font-size: 11px; color: var(--muted); line-height: 1.5;
  }

  /* ── CHART AREA ── */
  .chart-wrap {
    position: relative;
    width: 100%; max-width: 390px;
    margin: 8px auto 0;
    aspect-ratio: 1;
    user-select: none;
  }
  .chart-wrap img {
    width: 100%; height: 100%;
    object-fit: contain; display: block;
    pointer-events: none;
  }
  .chart-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  .zone {
    fill: transparent; stroke: none;
    cursor: pointer; transition: fill 0.15s;
  }
  .zone:hover    { fill: rgba(255,255,255,0.05); }
  .zone.targeted { fill: rgba(255,255,255,0.09); }

  .marker-group { cursor: pointer; }
  .marker-group text { transition: opacity 0.2s; }
  .marker-group:hover text { opacity: 0.6; }

  .chart-hint {
    text-align: center; font-size: 12px;
    color: var(--muted); margin: 5px 0 3px;
    letter-spacing: 0.03em;
  }

  /* ── PLANET TRAY ── */
  .planet-tray {
    display: flex; gap: 16px;
    justify-content: center;
    padding: 6px 20px 4px;
  }
  .planet-token {
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
    cursor: pointer; transition: opacity 0.2s;
  }
  .planet-token.placed { opacity: 0.3; }
  .planet-token.selected .token-circle {
    box-shadow: 0 0 0 2.5px var(--hi);
    background: var(--hi-dim);
  }
  .token-circle {
    width: 68px; height: 68px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    transition: box-shadow 0.2s, background 0.2s;
  }
  .token-label {
    font-size: 10px; letter-spacing: 0.1em;
    color: var(--muted); text-transform: uppercase;
  }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    width: 100%; max-width: 430px;
    display: flex; gap: 12px;
    padding: 10px 20px 28px;
  }
  .btn-clues {
    flex: 1; display: flex;
    align-items: center; justify-content: center; gap: 8px;
    padding: 14px 10px;
    border: 1.5px solid var(--border); border-radius: 14px;
    background: var(--surface); color: var(--text);
    font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
  }
  .btn-clues img { width: 22px; height: 22px; object-fit: contain; }
  .btn-clues:hover { border-color: rgba(255,255,255,0.4); background: var(--hi-dim); }

  .btn-check {
    flex: 1; padding: 14px; border-radius: 14px;
    background: var(--surface); color: var(--muted);
    font-size: 15px; font-weight: 600; letter-spacing: 0.04em;
    cursor: not-allowed; border: 1.5px solid var(--border);
    transition: background 0.3s, color 0.3s, border-color 0.3s;
  }
  .btn-check.ready {
    background: var(--hi); color: #0a0a0a;
    cursor: pointer; border-color: var(--hi);
  }

  /* ── OVERLAYS ── */
  .overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    flex-direction: column; justify-content: flex-end;
  }
  .overlay.open { display: flex; }

  .sheet {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    border-top: 1px solid var(--border);
    padding: 20px 20px 40px;
    max-height: 90dvh; overflow-y: auto;
  }
  .sheet-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 0 auto 20px;
  }

  /* ── RESULTS ── */
  .results-title { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .results-subtitle { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 14px; }

  .result-chart-wrap {
    position: relative;
    width: 100%; max-width: 310px;
    margin: 0 auto 14px;
    aspect-ratio: 1;
  }
  .result-chart-wrap img {
    width: 100%; height: 100%;
    object-fit: contain; display: block;
    pointer-events: none;
  }
  .result-chart-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  .result-summary {
    font-size: 13px; line-height: 1.65;
    color: var(--muted);
    padding: 14px 16px;
    background: var(--bg);
    border-radius: 14px;
    border: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .btn-next {
    width: 100%; margin-top: 16px; padding: 16px;
    border-radius: 14px; border: none;
    background: var(--hi); color: #0a0a0a;
    font-size: 16px; font-weight: 700;
    letter-spacing: 0.04em; cursor: pointer;
  }

  /* ── CLUES ── */
  .clues-title { font-size: 17px; font-weight: 700; text-align: center; margin-bottom: 16px; }
  .clue-item {
    display: flex; align-items: center; gap: 12px; padding: 14px;
    background: var(--bg); border-radius: 14px;
    border: 1px solid var(--border); margin-bottom: 10px;
    cursor: pointer; transition: border-color 0.2s;
  }
  .clue-item.locked   { opacity: 0.4; cursor: default; }
  .clue-item.revealed { border-color: rgba(255,255,255,0.35); cursor: default; }
  .clue-num {
    width: 30px; height: 30px; border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .clue-item.revealed .clue-num { border-color: rgba(255,255,255,0.5); color: var(--hi); }
  .clue-text { font-size: 13px; line-height: 1.5; color: var(--muted); }
  .clue-item.revealed .clue-text { color: var(--text); }
  .clues-used { text-align: center; font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .btn-close-clues {
    width: 100%; margin-top: 6px; padding: 14px;
    border-radius: 14px; border: 1.5px solid var(--border);
    background: transparent; color: var(--text);
    font-size: 15px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div class="header">
  <div class="header-top">
    <span class="case-label" id="caseLabel">Кейс №2350</span>
    <span class="case-title">Разгадайте натальную карту по описанию</span>

<!-- ── DESCRIPTION CARD ── -->

<!-- ── CHART ── -->

<!-- ── BOTTOM BAR ── -->

<!-- ── RESULTS OVERLAY ── -->
<div class="overlay" id="resultsOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>

<!-- ── CLUES OVERLAY ── -->
<div class="overlay" id="cluesOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="clues-title">Улики</div>
    <div class="clues-used" id="cluesUsed"></div>
    <div id="clueList"></div>
    <button class="btn-close-clues" onclick="closeClues()">Закрыть</button>

</div>

// ── GAME DATA ──────────────────────────────────────────────────────
const CASES = [

    summary: 'Стрелец на Асценденте даёт громкую, оптимистичную маску. Но управитель этой маски — Юпитер — спрятан в 12-м доме, в доме тайн. Туда же ушёл Скорпионий Меркурий: речь есть, следов нет. Солнце в Весах в 11-м доме объясняет, почему он живёт в группе и является душой компании — но только снаружи.',
    results: {
      sun:     { label: 'Весы' },
      jupiter: { label: 'Скорпион' },
      mercury: { label: 'Скорпион' },
    }
  },
  {
    id: 2351,
    title: "В детстве его творчество ограничивал отец, а теперь он сам строгий отец.",
    body: 'Хотя при этом дома очень внимательный и заботливый.',
    planets: ['saturn', 'moon'],
    prePlaced: { sun: 'libra', jupiter: 'scorpio', mercury: 'scorpio' },
    answer: { saturn: 'aries', moon: 'cancer' },
    clues: [
      "Помнит дни рождения всех. Детей, жены, тёщи. Звонит первым.",

      { planet1: 'saturn', planet2: 'sun',     type: 'opposition' },

    ],

  },
  {
    id: 2352,
    title: "В любви слишком расчётлив — но та же точность делает его репутацию в профессии.",

    prePlaced: { sun: 'libra', jupiter: 'scorpio', mercury: 'scorpio', moon: 'cancer', saturn: 'aries' },

      "В отношениях анализирует больше чем чувствует. Партнёры говорят — слишком в голове.",

      "Энергия направлена в одну точку — и всегда в сторону заработка.",
      "Планета красоты и любви стоит в доме карьеры. В знаке где всё взвешивают и критикуют.",

    ],
    summary: 'Венера в Деве в 10-м — любовь через критику, карьера через точность и эстетику. Марс в Козероге во 2-м — управитель 5-го дома творчества зарабатывает методично и целенаправленно. Творчество здесь не вдохновение — а инструмент.',
    aspects: [
      { planet1: 'moon',   planet2: 'jupiter', type: 'trine' },
      { planet1: 'moon',   planet2: 'mercury', type: 'trine' },

      venus: { label: 'Дева' },
      mars:  { label: 'Козерог' },

// ── ZODIAC CONFIG ─────────────────────────────────────────────────
// Chart (Natal Chat Circle 2.png):
// Scorpio at 9 o'clock (left, ASC/H1). Signs go CLOCKWISE visually
// (counter-clockwise in zodiac order: Sco→Lib→Vir→Leo→Can→Gem→Tau→Ari→Pis→Aqu→Cap→Sag)
// SVG: 0°=right(3h), 90°=down(6h), 180°=left(9h), 270°=top(12h), CW positive
// 9h=180°, 10h=210°, 11h=240°, 12h=270°, 1h=300°, 2h=330°, 3h=0°,
// 4h=30°, 5h=60°, 6h=90°, 7h=120°, 8h=150°
const SIGNS = [
  { id: 'scorpio',     label: 'Скорпион', symbol: '♏', startDeg: 180 }, // 9→10h  H1
  { id: 'libra',       label: 'Весы',     symbol: '♎', startDeg: 210 }, // 10→11h H12
  { id: 'virgo',       label: 'Дева',     symbol: '♍', startDeg: 240 }, // 11→12h H11
  { id: 'leo',         label: 'Лев',      symbol: '♌', startDeg: 270 }, // 12→1h  H10
  { id: 'cancer',      label: 'Рак',      symbol: '♋', startDeg: 300 }, // 1→2h   H9
  { id: 'gemini',      label: 'Близнецы', symbol: '♊', startDeg: 330 }, // 2→3h   H8
  { id: 'taurus',      label: 'Телец',    symbol: '♉', startDeg:   0 }, // 3→4h   H7
  { id: 'aries',       label: 'Овен',     symbol: '♈', startDeg:  30 }, // 4→5h   H6
  { id: 'pisces',      label: 'Рыбы',     symbol: '♓', startDeg:  60 }, // 5→6h   H5
  { id: 'aquarius',    label: 'Водолей',  symbol: '♒', startDeg:  90 }, // 6→7h   H4
  { id: 'capricorn',   label: 'Козерог',  symbol: '♑', startDeg: 120 }, // 7→8h   H3
  { id: 'sagittarius', label: 'Стрелец',  symbol: '♐', startDeg: 150 }, // 8→9h   H2
];

const CX = 195, CY = 195;
const R_OUTER = 188;  // outer click boundary
const R_INNER = 70;   // inner click boundary (covers full sector)
const R_MARKER = 108; // where symbols are placed (inner planet ring)

// ── STATE ─────────────────────────────────────────────────────────
let caseIdx = 0;
let selectedPlanet = null;
let placements = {};      // { planetId: signId }
let cluesRevealed = 0;

// ── HELPERS ───────────────────────────────────────────────────────
function degToRad(d) { return d * Math.PI / 180; }

function polarToXY(cx, cy, r, angleDeg) {
  const rad = degToRad(angleDeg);
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function sectorPath(cx, cy, rO, rI, s, e) {
  const p1 = polarToXY(cx, cy, rO, s), p2 = polarToXY(cx, cy, rO, e);
  const p3 = polarToXY(cx, cy, rI, e), p4 = polarToXY(cx, cy, rI, s);
  const lg = (e - s) > 180 ? 1 : 0;
  return `M ${p1.x} ${p1.y} A ${rO} ${rO} 0 ${lg} 1 ${p2.x} ${p2.y} L ${p3.x} ${p3.y} A ${rI} ${rI} 0 ${lg} 0 ${p4.x} ${p4.y} Z`;
}

// ── BUILD SVG ZONES ───────────────────────────────────────────────
function buildZones() {
  const svg = document.getElementById('chartSvg');
  svg.innerHTML = '';
  SIGNS.forEach(sign => {
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', sectorPath(CX, CY, R_OUTER, R_INNER, sign.startDeg, sign.startDeg + 30));
    path.setAttribute('class', 'zone');
    path.setAttribute('data-sign', sign.id);
    path.addEventListener('click', () => placeOnZone(sign.id));
    svg.appendChild(path);
  });
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.id = 'markersGroup';
  svg.appendChild(g);
}

// ── RENDER MARKERS ────────────────────────────────────────────────
function renderMarkers() {
  const c = CASES[caseIdx];
  const g = document.getElementById('markersGroup');
  g.innerHTML = '';

  const allPlacements = { ...(c.prePlaced || {}), ...placements };

  // Group by sign + compute positions
  const bySign = {};
  Object.entries(allPlacements).forEach(([planet, signId]) => {
    if (!bySign[signId]) bySign[signId] = [];
    bySign[signId].push({ planet, isPrePlaced: !!(c.prePlaced?.[planet]) });
  });

  const markerPos = {};
  Object.entries(bySign).forEach(([signId, items]) => {
    const sign = SIGNS.find(s => s.id === signId);
    if (!sign) return;
    const n = items.length;
    items.forEach((item, i) => {
      const mid    = sign.startDeg + 15;
      const spread = n === 1 ? 0 : (n === 2 ? 9 : 10);
      const offset = n === 1 ? 0 : (i - (n - 1) / 2) * spread;
      markerPos[item.planet] = polarToXY(CX, CY, R_MARKER, mid + offset);
    });
  });

  // Draw aspect lines FIRST (under markers) — only when both endpoints are placed
  (c.aspects || []).forEach(asp => {
    const p1 = markerPos[asp.planet1], p2 = markerPos[asp.planet2];
    if (!p1 || !p2) return;
    const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    ln.setAttribute('x1', p1.x); ln.setAttribute('y1', p1.y);
    ln.setAttribute('x2', p2.x); ln.setAttribute('y2', p2.y);
    ln.setAttribute('stroke', 'rgba(255,255,255,0.35)');
    ln.setAttribute('stroke-width', '1.5');
    g.appendChild(ln);
  });

  // Draw planet symbols ON TOP
  Object.entries(bySign).forEach(([signId, items]) => {
    items.forEach(item => {
      const info = PLANET_INFO[item.planet];
      const pos  = markerPos[item.planet];

      const grp = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      grp.setAttribute('class', 'marker-group');
      if (!item.isPrePlaced) {
        grp.addEventListener('click', e => { e.stopPropagation(); selectPlanet(item.planet); });
      }

      const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      txt.setAttribute('x', pos.x);
      txt.setAttribute('y', pos.y + 7);
      txt.setAttribute('text-anchor', 'middle');
      txt.setAttribute('font-size', '20');
      txt.setAttribute('fill', item.isPrePlaced ? 'rgba(255,255,255,0.35)' : info.color);
      txt.setAttribute('pointer-events', 'none');
      txt.textContent = info.symbol;
      grp.appendChild(txt);
      g.appendChild(grp);
    });
  });
}

// ── PLANET TRAY ───────────────────────────────────────────────────
function renderTray() {
  const c = CASES[caseIdx];
  const tray = document.getElementById('planetTray');
  tray.innerHTML = c.planets.map(p => {
    const info = PLANET_INFO[p];
    return `
      <div class="planet-token" data-planet="${p}" onclick="selectPlanet('${p}')">
        <div class="token-circle">${info.symbol}</div>
        <span class="token-label">${info.label}</span>
      </div>`;
  }).join('');
}

// ── PLANET SELECTION ──────────────────────────────────────────────
function selectPlanet(planet) {
  const token = document.querySelector(`[data-planet="${planet}"]`);

  // lift off chart if already placed
  if (placements[planet]) {
    delete placements[planet];
    token.classList.remove('placed');
    renderMarkers();
    updateProgress();
  }

  // toggle off if tapping already-selected
  if (selectedPlanet === planet) {
    token.classList.remove('selected');
    selectedPlanet = null;
    clearZoneHighlights();
    return;
  }

  // deselect previous
  if (selectedPlanet) {
    document.querySelector(`[data-planet="${selectedPlanet}"]`)?.classList.remove('selected');
  }

  selectedPlanet = planet;
  token.classList.add('selected');
  highlightZones(true);
}

function highlightZones(on) {
  document.querySelectorAll('.zone').forEach(z => z.classList.toggle('targeted', on));
}
function clearZoneHighlights() {
  document.querySelectorAll('.zone').forEach(z => z.classList.remove('targeted'));
}

// ── PLACE PLANET ──────────────────────────────────────────────────
function placeOnZone(signId) {
  if (!selectedPlanet) return;
  // multiple planets per sign are now allowed — no swap logic
  const token = document.querySelector(`[data-planet="${selectedPlanet}"]`);
  placements[selectedPlanet] = signId;
  token.classList.remove('selected');
  token.classList.add('placed');
  selectedPlanet = null;
  clearZoneHighlights();
  renderMarkers();
  updateProgress();
}

// ── PROGRESS ──────────────────────────────────────────────────────
function updateProgress() {
  const total = CASES[caseIdx].planets.length;
  const placed = Object.keys(placements).length;
  document.getElementById('counter').textContent = `${placed}/${total}`;

  // rebuild progress segments to match planet count
  const bar = document.getElementById('progressBar');
  bar.innerHTML = CASES[caseIdx].planets.map((_, i) =>
    `<div class="seg${i < placed ? ' filled' : ''}"></div>`
  ).join('');

  const ready = placed === total;
  const btn = document.getElementById('btnCheck');
  btn.classList.toggle('ready', ready);
  btn.disabled = !ready;
}

// ── CHECK ──────────────────────────────────────────────────────────
function checkAnswers() {
  const c = CASES[caseIdx];
  if (Object.keys(placements).length < c.planets.length) return;

  let correct = 0;
  c.planets.forEach(p => { if (placements[p] === c.answer[p]) correct++; });
  const total = c.planets.length;

  document.getElementById('resultsTitle').textContent =
    correct === total ? `${correct} из ${total} — Блестяще!` : `${correct} из ${total}`;
  document.getElementById('resultsSubtitle').textContent =
    correct === total ? 'Вы отлично чувствуете натальную карту.' :
    correct >= total / 2 ? 'Почти угадали всё.' : 'Есть куда расти.';

  renderResultChart(c, placements);

  const summaryEl = document.getElementById('resultSummary');
  summaryEl.textContent = c.summary || '';
  summaryEl.style.display = c.summary ? 'block' : 'none';

  document.getElementById('resultsOverlay').classList.add('open');
}

function renderResultChart(c, userPlacements) {
  const svgEl = document.getElementById('resultSvg');
  svgEl.innerHTML = '';

  // ── 1. Compute correct marker positions (for aspect lines) ──
  const allCorrect = { ...(c.prePlaced || {}), ...c.answer };
  const correctBySign = {};
  Object.entries(allCorrect).forEach(([planet, signId]) => {
    if (!correctBySign[signId]) correctBySign[signId] = [];
    correctBySign[signId].push(planet);
  });
  const markerPos = {};
  Object.entries(correctBySign).forEach(([signId, planets]) => {
    const sign = SIGNS.find(s => s.id === signId);
    if (!sign) return;
    const n = planets.length;
    planets.forEach((planet, i) => {
      const mid    = sign.startDeg + 15;
      const spread = n === 1 ? 0 : n === 2 ? 9 : 10;
      const offset = n === 1 ? 0 : (i - (n - 1) / 2) * spread;
      markerPos[planet] = polarToXY(CX, CY, R_MARKER, mid + offset);
    });
  });

  // ── 2. Draw aspect lines UNDER markers ──
  const gLines = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  (c.aspects || []).forEach(asp => {
    const p1 = markerPos[asp.planet1], p2 = markerPos[asp.planet2];
    if (!p1 || !p2) return;
    const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    ln.setAttribute('x1', p1.x); ln.setAttribute('y1', p1.y);
    ln.setAttribute('x2', p2.x); ln.setAttribute('y2', p2.y);
    ln.setAttribute('stroke', 'rgba(255,255,255,0.4)');
    ln.setAttribute('stroke-width', '1.5');
    gLines.appendChild(ln);
  });
  svgEl.appendChild(gLines);

  // ── 3. Build marker list: pre-placed + answer (correct) + wrong user placements ──
  const allMarkers = [];
  Object.entries(c.prePlaced || {}).forEach(([planet, signId]) => {
    allMarkers.push({ planet, signId, isCorrect: true });
  });
  c.planets.forEach(planet => {
    const correctSign = c.answer[planet];
    const userSign    = userPlacements[planet];
    allMarkers.push({ planet, signId: correctSign, isCorrect: true });
    if (userSign !== correctSign) {
      allMarkers.push({ planet, signId: userSign, isCorrect: false });
    }
  });

  // Group by sign for spread
  const markersBySign = {};
  allMarkers.forEach(m => {
    if (!markersBySign[m.signId]) markersBySign[m.signId] = [];
    markersBySign[m.signId].push(m);
  });

  const gM = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  Object.entries(markersBySign).forEach(([signId, markers]) => {
    const sign = SIGNS.find(s => s.id === signId);
    if (!sign) return;
    const n = markers.length;
    markers.forEach((m, i) => {
      const mid    = sign.startDeg + 15;
      const spread = n === 1 ? 0 : n === 2 ? 9 : 10;
      const offset = n === 1 ? 0 : (i - (n - 1) / 2) * spread;
      const pos    = polarToXY(CX, CY, R_MARKER, mid + offset);
      const info   = PLANET_INFO[m.planet];

      if (m.isCorrect) {
        const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circ.setAttribute('cx', pos.x); circ.setAttribute('cy', pos.y);
        circ.setAttribute('r', 15);
        circ.setAttribute('fill', 'rgba(255,255,255,0.15)');
        circ.setAttribute('stroke', 'rgba(255,255,255,0.75)');
        circ.setAttribute('stroke-width', '1.5');
        gM.appendChild(circ);
        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('x', pos.x); t.setAttribute('y', pos.y + 7);
        t.setAttribute('text-anchor', 'middle');
        t.setAttribute('font-size', '19'); t.setAttribute('fill', '#ffffff');
        t.textContent = info.symbol;
        gM.appendChild(t);
      } else {
        const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circ.setAttribute('cx', pos.x); circ.setAttribute('cy', pos.y);
        circ.setAttribute('r', 15);
        circ.setAttribute('fill', 'rgba(180,40,40,0.25)');
        circ.setAttribute('stroke', 'rgba(220,70,70,0.8)');
        circ.setAttribute('stroke-width', '1.5');
        gM.appendChild(circ);
        const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('x', pos.x); t.setAttribute('y', pos.y + 7);
        t.setAttribute('text-anchor', 'middle');
        t.setAttribute('font-size', '19'); t.setAttribute('fill', 'rgba(220,80,80,0.6)');
        t.textContent = info.symbol;
        gM.appendChild(t);
        const d = 9;
        [[pos.x-d,pos.y-d,pos.x+d,pos.y+d],[pos.x+d,pos.y-d,pos.x-d,pos.y+d]].forEach(([x1,y1,x2,y2]) => {
          const l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          l.setAttribute('x1',x1); l.setAttribute('y1',y1);
          l.setAttribute('x2',x2); l.setAttribute('y2',y2);
          l.setAttribute('stroke','rgba(220,60,60,0.95)');
          l.setAttribute('stroke-width','2'); l.setAttribute('stroke-linecap','round');
          gM.appendChild(l);
        });
      }
    });
  });
  svgEl.appendChild(gM);
}

// ── NEXT CASE ─────────────────────────────────────────────────────
function nextCase() {
  caseIdx = (caseIdx + 1) % CASES.length;
  document.getElementById('resultsOverlay').classList.remove('open');
  loadCase();
}

function loadCase() {
  const c = CASES[caseIdx];
  placements = {};
  selectedPlanet = null;
  cluesRevealed = 0;

  document.getElementById('caseLabel').textContent = `Кейс №${c.id}`;
  document.getElementById('caseTitle').textContent = c.title;
  document.getElementById('caseBody').textContent  = c.body;

  renderTray();
  updateProgress();
  renderMarkers();
  renderClues();
}

// ── CLUES ─────────────────────────────────────────────────────────
function renderClues() {
  const c = CASES[caseIdx];
  document.getElementById('clueList').innerHTML = c.clues.map((clue, i) => {
    const revealed = i < cluesRevealed;
    const locked   = !revealed && i > cluesRevealed;
    return `
      <div class="clue-item ${revealed ? 'revealed' : ''} ${locked ? 'locked' : ''}"
           onclick="${!revealed && !locked ? `revealClue(${i})` : ''}">
        <div class="clue-num">${i + 1}</div>
        <div class="clue-text">${revealed ? clue : locked ? '🔒 Сначала откройте предыдущую' : '👆 Нажмите, чтобы открыть'}</div>
      </div>`;
  }).join('');
  document.getElementById('cluesUsed').textContent = `Использовано: ${cluesRevealed} из ${c.clues.length}`;
}

function revealClue(idx) {
  if (idx !== cluesRevealed) return;
  cluesRevealed++;
  renderClues();
}

function openClues()  { renderClues(); document.getElementById('cluesOverlay').classList.add('open'); }
function closeClues() { document.getElementById('cluesOverlay').classList.remove('open'); }

// ── INIT ──────────────────────────────────────────────────────────
buildZones();
loadCase();
</script>
